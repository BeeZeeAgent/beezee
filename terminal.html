<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BeeZee Terminal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #09090b; overflow: hidden; }
    #terminal { height: 100dvh; }
    #status {
      position: fixed; bottom: 8px; right: 12px;
      font: 11px/1 monospace; color: #52525b; pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="terminal"></div>
  <div id="status">connecting…</div>
  <script>
    // Parse the path prefix and session ID from the current URL.
    // Direct:  /terminal/1              → prefix="",               sessionId="1"
    // Relay:   /i/tenant-default/terminal/1 → prefix="/i/tenant-default", sessionId="1"
    const m = window.location.pathname.match(/^(.*?)\/terminal\/(\d+)/);
    const prefix = m ? m[1] : '';
    const sessionId = m ? m[2] : window.location.pathname.split('/').pop();
    const status = document.getElementById('status');

    const term = new Terminal({
      theme: {
        background: '#09090b', foreground: '#e4e4e7',
        cursor: '#FFE566', selectionBackground: '#3f3f46',
      },
      fontFamily: 'Menlo, "Fira Code", "Cascadia Code", monospace',
      fontSize: 14,
      lineHeight: 1.2,
      cursorBlink: true,
      scrollback: 5000,
    });

    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal'));
    fitAddon.fit();

    let inputQueue = Promise.resolve();

    function sendInput(data) {
      const body = new TextEncoder().encode(data);
      inputQueue = inputQueue.then(() =>
        fetch(`${prefix}/terminal/${sessionId}/input`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/octet-stream' },
          body,
        }).catch(() => {})
      );
    }

    function sendResize() {
      fetch(`${prefix}/terminal/${sessionId}/resize`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cols: term.cols, rows: term.rows }),
      }).catch(() => {});
    }

    function connect() {
      const es = new EventSource(`${prefix}/terminal/${sessionId}/stream`);

      es.onopen = () => {
        status.textContent = 'connected';
        sendResize();
      };

      es.onmessage = (e) => {
        try {
          const bytes = Uint8Array.from(atob(e.data), c => c.charCodeAt(0));
          term.write(bytes);
        } catch {}
      };

      es.onerror = () => {
        status.textContent = 'disconnected — reconnecting…';
        es.close();
        setTimeout(connect, 2000);
      };
    }

    term.onData(data => sendInput(data));

    window.addEventListener('resize', () => {
      fitAddon.fit();
      sendResize();
    });

    connect();
  </script>
</body>
</html>
